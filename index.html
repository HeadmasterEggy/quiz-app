<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>Course Quiz</title>
    <link rel="stylesheet" href="styles.css?v=12">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script>
        // Apply saved/system theme before first paint to avoid a flash of the wrong theme
        (function () {
            try {
                var t = localStorage.getItem('quiz_theme');
                if (t !== 'light' && t !== 'dark') {
                    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <div class="drawer-backdrop hidden" id="drawerBackdrop"></div>
    <div class="container">
        <div class="quiz-header">
            <button id="menuBtn" class="icon-btn menu-btn" title="Settings" aria-label="Open settings" aria-expanded="false" aria-controls="headerControls">☰</button>
            <h1><span class="h1-emoji">📚</span> <span class="h1-text">Course Quiz</span></h1>
            <div class="header-controls" id="headerControls">
                <div class="drawer-header">
                    <span class="drawer-title">📚 Course & Week</span>
                    <button id="drawerCloseBtn" class="icon-btn drawer-close" title="Close" aria-label="Close course picker">✕</button>
                </div>
                <div class="filter-controls">
                    <select id="courseFilter" class="filter-select course-select" aria-label="Course filter">
                        <option value="all">All Courses</option>
                    </select>
                    <select id="weekFilter" class="filter-select week-select" aria-label="Week filter">
                        <option value="all">All Weeks & Exams</option>
                    </select>
                </div>
                <div class="chip-filters" id="chipFilters">
                    <div class="chip-section-label">Course</div>
                    <div class="chip-list" id="courseChips"></div>
                    <div class="chip-section-label">Week / Exam</div>
                    <div class="chip-list" id="weekChips"></div>
                </div>
                <div class="tool-controls">
                    <button id="shuffleToggleBtn" class="icon-btn toggle-btn" title="Shuffle off" aria-label="Shuffle off" aria-pressed="false">🔀</button>
                    <button id="themeToggleBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle light/dark theme">🌙</button>
                    <button id="headerRestartBtn" class="icon-btn" title="Restart" aria-label="Restart quiz">↻</button>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="counter-row">
                <button id="prevNavBtn" class="nav-btn" title="Previous question" aria-label="Previous question" disabled>‹</button>
                <button class="question-counter" id="questionCounter" aria-expanded="false" aria-controls="jumpPanel" title="Jump to a specific question">Ready</button>
                <button id="nextNavBtn" class="nav-btn" title="Next question" aria-label="Next question" disabled>›</button>
            </div>
        </div>

        <div class="jump-panel hidden" id="jumpPanel" role="dialog" aria-label="Jump to question">
            <div class="jump-grid" id="jumpGrid"></div>
            <button class="jump-results-btn" id="jumpResultsBtn">🏁 View Results</button>
        </div>

        <div class="loading-card" id="loadingCard">
            <div class="spinner"></div>
            <p>Loading questions...</p>
        </div>

        <div class="quiz-card hidden" id="quizCard">
            <div class="question-text" id="questionText"></div>
            <div class="maq-hint hidden" id="maqHint">Pick <strong>2</strong> answers</div>
            <div class="options" id="options"></div>
            <button class="reveal-btn hidden" id="revealBtn">👁 Show Answer</button>
            <button class="maq-check-btn hidden" id="maqCheckBtn">✓ Check Answers</button>
            <div class="explanation-inline hidden" id="explanationInline">
                <div class="result-badge" id="resultBadge"></div>
                <div class="explanation-text" id="explanationText"></div>
            </div>
            <button class="next-btn hidden" id="nextBtn">Next →</button>
        </div>

        <div class="results-card hidden" id="resultsCard">
            <div class="trophy">🏆</div>
            <h2>Quiz Complete!</h2>
            <div class="final-score" id="finalScore"></div>
            <div class="score-percentage" id="scorePercentage"></div>
            <div class="score-breakdown" id="scoreBreakdown"></div>
            <div class="score-message" id="scoreMessage"></div>
            <div class="answers-review" id="answersReview"></div>
            <div class="results-actions">
                <button class="restart-btn" id="restartBtn">↻ Restart</button>
                <button class="retry-wrong-btn hidden" id="retryWrongBtn">🔄 Retry Wrong Answers</button>
            </div>
        </div>
    </div>

    <div class="fab-stack" id="fabStack">
        <div class="fab-actions" id="fabActions">
            <div class="fab-row">
                <span class="fab-label">Shuffle</span>
                <button class="fab-mini" id="fabShuffleBtn" title="Shuffle" aria-label="Toggle shuffle" aria-pressed="false">🔀</button>
            </div>
            <div class="fab-row">
                <span class="fab-label">Theme</span>
                <button class="fab-mini" id="fabThemeBtn" title="Toggle theme" aria-label="Toggle light/dark theme">🌙</button>
            </div>
            <div class="fab-row">
                <span class="fab-label">Restart</span>
                <button class="fab-mini" id="fabRestartBtn" title="Restart" aria-label="Restart quiz">↻</button>
            </div>
        </div>
        <button class="fab-main" id="fabMainBtn" aria-expanded="false" aria-label="Quick actions">⋮</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="data/questions.js?v=13"></script>
    <script src="app.js?v=12"></script>
</body>
</html>
