<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFO5995 Quiz</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1>🔐 INFO5995 Quiz</h1>
            <div class="header-controls">
                <select id="weekFilter" class="week-select">
                    <option value="all">All Weeks & Exams</option>
                </select>
                <button id="headerRestartBtn" class="icon-btn" title="Restart">↻</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">Ready</div>
        </div>

        <div class="loading-card" id="loadingCard">
            <div class="spinner"></div>
            <p>Loading questions...</p>
        </div>

        <div class="resume-banner hidden" id="resumeBanner">
            <span class="resume-icon">💾</span>
            <span id="resumeText">Continue where you left off?</span>
            <button class="resume-btn" id="resumeBtn">Continue</button>
            <button class="resume-discard" id="resumeDiscardBtn">Start Fresh</button>
        </div>

        <div class="quiz-card hidden" id="quizCard">
            <div class="question-text" id="questionText"></div>
            <div class="maq-hint hidden" id="maqHint">Pick <strong>2</strong> answers</div>
            <div class="options" id="options"></div>
            <button class="maq-check-btn hidden" id="maqCheckBtn">✓ Check Answers</button>
            <div class="explanation-inline hidden" id="explanationInline">
                <div class="result-badge" id="resultBadge"></div>
                <div class="explanation-text" id="explanationText"></div>
            </div>
            <button class="next-btn hidden" id="nextBtn">Next →</button>
        </div>

        <div class="results-card hidden" id="resultsCard">
            <div class="trophy">🏆</div>
            <h2>Quiz Complete!</h2>
            <div class="final-score" id="finalScore"></div>
            <div class="score-percentage" id="scorePercentage"></div>
            <div class="score-breakdown" id="scoreBreakdown"></div>
            <div class="score-message" id="scoreMessage"></div>
            <div class="score-history hidden" id="scoreHistory"></div>
            <div class="answers-review" id="answersReview"></div>
            <div class="results-actions">
                <button class="restart-btn" id="restartBtn">↻ Restart</button>
                <button class="retry-wrong-btn hidden" id="retryWrongBtn">🔄 Retry Wrong Answers</button>
            </div>
        </div>
    </div>

    <script src="data/questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
