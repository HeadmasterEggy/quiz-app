<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Quiz</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script>
        // Apply saved/system theme before first paint to avoid a flash of the wrong theme
        (function () {
            try {
                var t = localStorage.getItem('quiz_theme');
                if (t !== 'light' && t !== 'dark') {
                    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
                }
                document.documentElement.setAttribute('data-theme', t);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1>📚 Course Quiz</h1>
            <div class="header-controls">
                <select id="courseFilter" class="filter-select course-select" aria-label="Course filter">
                    <option value="all">All Courses</option>
                </select>
                <select id="weekFilter" class="filter-select week-select" aria-label="Week filter">
                    <option value="all">All Weeks & Exams</option>
                </select>
                <button id="shuffleToggleBtn" class="icon-btn toggle-btn" title="Shuffle off" aria-label="Shuffle off" aria-pressed="false">🔀</button>
                <button id="themeToggleBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle light/dark theme">🌙</button>
                <button id="headerRestartBtn" class="icon-btn" title="Restart">↻</button>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="question-counter" id="questionCounter">Ready</div>
        </div>

        <div class="loading-card" id="loadingCard">
            <div class="spinner"></div>
            <p>Loading questions...</p>
        </div>

        <div class="quiz-card hidden" id="quizCard">
            <div class="question-text" id="questionText"></div>
            <div class="maq-hint hidden" id="maqHint">Pick <strong>2</strong> answers</div>
            <div class="options" id="options"></div>
            <button class="maq-check-btn hidden" id="maqCheckBtn">✓ Check Answers</button>
            <div class="explanation-inline hidden" id="explanationInline">
                <div class="result-badge" id="resultBadge"></div>
                <div class="explanation-text" id="explanationText"></div>
            </div>
            <button class="next-btn hidden" id="nextBtn">Next →</button>
        </div>

        <div class="results-card hidden" id="resultsCard">
            <div class="trophy">🏆</div>
            <h2>Quiz Complete!</h2>
            <div class="final-score" id="finalScore"></div>
            <div class="score-percentage" id="scorePercentage"></div>
            <div class="score-breakdown" id="scoreBreakdown"></div>
            <div class="score-message" id="scoreMessage"></div>
            <div class="answers-review" id="answersReview"></div>
            <div class="results-actions">
                <button class="restart-btn" id="restartBtn">↻ Restart</button>
                <button class="retry-wrong-btn hidden" id="retryWrongBtn">🔄 Retry Wrong Answers</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="data/questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
